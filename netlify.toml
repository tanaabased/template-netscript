[build]
  publish = "dist"

[[headers]]
  for = "/*.sh"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/*.ps1"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Content-Type = "text/plain; charset=utf-8"
